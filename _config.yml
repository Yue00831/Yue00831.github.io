# Welcome to Jekyll!
# Site Settings
locale: "en-US"
title: "Yue Li"
title_separator: "|"
subtitle: "PhD Candidate in Linguistics · Purdue University"
name: "Yue Li"
description: "PhD Candidate in Linguistics at Purdue University. I study animacy, syntactic processing, and large language models."
url: "https://yue00831.github.io"
baseurl: ""
repository: "Yue00831/Yue00831.github.io"

# Theme Settings
remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "air"

# Site Author (sidebar)
author:
  name: "Yue Li (李悦)"
  avatar: "/assets/images/bio-photo.JPG"
  bio: "PhD Candidate in Linguistics at Purdue University. I study how language is constructed and represented in both humans and machines."
  location: "West Lafayette, IN"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:li4207@purdue.edu"
    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com/citations?user=ZqTKdoAAAAAJ&hl=en&oi=sra"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Yue00831"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/yue-li-34047933a/"

# Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Yue00831"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/yue-li-34047933a/"

# Reading Files
include:
  - _pages

# Outputting
permalink: /:categories/:title/
timezone: America/Indiana/Indianapolis

# Pagination
paginate: 5
paginate_path: /page:num/

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: false
      share: false
      related: false
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
